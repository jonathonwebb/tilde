name: Release

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Confirm production release'
        required: true
        type: boolean
        default: false

jobs:
  deploy_to_production:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: release
      url: https://tilde.apps.jonwebb.dev
    concurrency:
      group: release_environment
      cancel-in-progress: false
    steps:
      -
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      -
        uses: dokku/github-action@v1
        if:
        with:
          git_remote_url: 'ssh://${{ vars.DOKKU_HOST }}/${{ vars.DOKKU_APP_NAME }}'
          ssh_private_key: ${{ secrets.DOKKU_SSH_PRIVATE_KEY }}
          deploy_docker_image: ${{ github.repository }}:latest
