name: Docker

on: [push]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      -
        uses: actions/checkout@v4
      -
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        uses: docker/setup-buildx-action@v3
      -
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      -
        uses: actions/cache@v4
        with:
          path: pnpm-deps-cache
          key: ${{ runner.os }}-pnpm-deps-cache-${{ hashFiles('**/pnpm-lock.yaml') }}

      - uses: reproducible-containers/buildkit-cache-dance@v2.1.4
        with:
          cache-source: pnpm-deps-cache
      -
        uses: docker/build-push-action@v6
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test
      -
        id: test
        run: |
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test ./bin/test
      # -
